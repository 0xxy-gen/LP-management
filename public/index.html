<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Namecard Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    header p {
      color: #666;
      font-size: 14px;
    }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .source-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .source-row label {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
    }

    .source-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .source-row input:focus {
      border-color: #4a4a4a;
    }

    .drop-zone {
      border: 2px dashed #2a2a2a;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #141414;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #555;
      background: #1a1a1a;
    }

    .drop-zone.drag-over {
      border-color: #888;
    }

    .drop-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .drop-zone h2 {
      font-size: 18px;
      font-weight: 500;
      color: #ccc;
      margin-bottom: 8px;
    }

    .drop-zone p {
      font-size: 13px;
      color: #555;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .preview-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .preview-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }

    .preview-card .status {
      padding: 8px 10px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .preview-card .status.scanning { color: #888; }
    .preview-card .status.done { color: #5cb85c; }
    .preview-card .status.error { color: #e05555; }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .result-thumb {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .result-info { flex: 1; min-width: 0; }

    .result-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    .result-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .field-tag {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .notion-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 5px 10px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 12px;
      color: #bbb;
      text-decoration: none;
      transition: background 0.15s;
    }

    .notion-link:hover { background: #262626; color: #fff; }

    .error-banner {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e05555;
    }
  </style>
</head>
<body>
  <header>
    <h1>Namecard Scanner</h1>
    <p>Drop namecard images to extract and sync to Notion</p>
  </header>

  <div class="container">
    <div class="source-row">
      <label>Where/how met:</label>
      <input type="text" id="sourceInput" placeholder="e.g. SuperReturn 2026, Singapore" />
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📇</div>
      <h2>Drop namecards here</h2>
      <p>or click to select images</p>
      <input type="file" id="fileInput" multiple accept="image/*" />
    </div>

    <div class="preview-grid" id="previewGrid"></div>
    <div class="result-list" id="resultList"></div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewGrid = document.getElementById('previewGrid');
    const resultList = document.getElementById('resultList');
    const sourceInput = document.getElementById('sourceInput');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

    function handleFiles(files) {
      const images = files.filter(f => f.type.startsWith('image/'));
      images.forEach(processFile);
      fileInput.value = '';
    }

    function processFile(file) {
      const objectUrl = URL.createObjectURL(file);

      // Preview card
      const card = document.createElement('div');
      card.className = 'preview-card';
      card.innerHTML = `
        <img src="${objectUrl}" alt="namecard" />
        <div class="status scanning">
          <div class="spinner"></div>
          <span>Scanning...</span>
        </div>
      `;
      previewGrid.prepend(card);

      const formData = new FormData();
      formData.append('namecard', file);
      if (sourceInput.value.trim()) formData.append('source', sourceInput.value.trim());

      fetch('/scan', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            card.querySelector('.status').className = 'status done';
            card.querySelector('.status').innerHTML = `<span>✓ Synced to Notion</span>`;
            showResult(data.contact, data.notionUrl, objectUrl);
          } else {
            throw new Error(data.error || 'Unknown error');
          }
        })
        .catch(err => {
          card.querySelector('.status').className = 'status error';
          card.querySelector('.status').innerHTML = `<span>✗ ${err.message}</span>`;
        });
    }

    function showResult(contact, notionUrl, thumb) {
      const fields = [];
      if (contact.email) fields.push({ icon: '✉', value: contact.email });
      if (contact.phone) fields.push({ icon: '📞', value: contact.phone });
      if (contact.website) fields.push({ icon: '🌐', value: contact.website });
      if (contact.linkedin) fields.push({ icon: 'in', value: 'LinkedIn' });

      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <img class="result-thumb" src="${thumb}" alt="namecard" />
        <div class="result-info">
          <div class="result-name">${contact.fullName || 'Unknown'}</div>
          <div class="result-sub">${[contact.jobTitle, contact.company].filter(Boolean).join(' · ')}</div>
          <div class="result-fields">
            ${fields.map(f => `<span class="field-tag">${f.icon} ${f.value}</span>`).join('')}
          </div>
          <a class="notion-link" href="${notionUrl}" target="_blank">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            View in Notion
          </a>
        </div>
      `;
      resultList.prepend(card);
    }
  </script>
</body>
</html>
